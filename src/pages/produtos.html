<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MM Montagens - Categorias</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Montserrat', 'sans-serif'],
                        condensed: ['Oswald', 'sans-serif'],
                    },
                    colors: {
                        mm: { blue: '#1489c8', darkblue: '#0d5d9c', yellow: '#fbc02d', footer: '#1a1a1a' }
                    }
                }
            }
        }
    </script>
</head>
<body class="font-sans antialiased text-gray-800 bg-gray-50 overflow-x-hidden">

    <!-- HEADER -->
    <header class="w-full bg-white h-[100px] flex items-center justify-between px-8 lg:px-24 shadow-sm relative z-50">
        <a href="../../index.html" class="flex items-center justify-center transition hover:scale-105">
            <img src="../../midia/logo4.png" alt="MM Montagens" class="w-[160px] h-auto object-contain">    
        </a>

        <nav class="hidden md:flex items-center gap-8 text-[14px] font-semibold">
            <a href="../../index.html" class="text-[#3aa4de] hover:text-mm-blue transition">Home</a>
            <a href="quem-somos.html" class="text-[#3aa4de] hover:text-mm-blue transition">Quem Somos</a>
            
            <a href="produtos.html" class="text-mm-blue relative flex flex-col items-center">
                <span class="flex items-center gap-1">Produtos <i class="fas fa-chevron-down text-[10px] mt-1"></i></span>
                <span class="absolute -bottom-2 w-[110%] h-[3px] bg-mm-yellow rounded-full"></span>
            </a>
            
            <a href="galeria.html" class="text-[#3aa4de] hover:text-mm-blue transition">Galeria</a>
            <a href="blog.html" class="text-[#3aa4de] hover:text-mm-blue transition">Blog</a>
            <a href="contato.html" class="text-[#3aa4de] hover:text-mm-blue transition">Contato</a>
            <a href="carrinho.html" class="relative text-mm-blue hover:text-mm-darkblue transition ml-4 text-xl flex items-center">
                <i class="fas fa-shopping-cart"></i>
                <!-- A bolinha que o JS vai atualizar -->
                <span class="badge-carrinho absolute -top-2 -right-3 bg-mm-yellow text-gray-900 text-[10px] font-black w-4 h-4 flex items-center justify-center rounded-full hidden">0</span>
            </a>
        </nav>
    </header>

    <!-- BANNER -->
    <section class="relative w-full h-[280px] flex items-center justify-center overflow-hidden border-t border-mm-blue/20">
        <div class="absolute inset-0 bg-cover bg-center" style="background-image: url('https://images.unsplash.com/photo-1504917595217-d4dc5ebe6122?auto=format&fit=crop&q=80');"></div>
        <div class="absolute inset-0 bg-gradient-to-r from-[#1489c8]/95 via-[#1489c8]/85 to-[#0e6ba0]/95 mix-blend-multiply"></div>
        <div class="relative z-10 text-center text-white flex flex-col mt-4">
            <h1 class="text-[75px] md:text-[90px] font-[Oswald] font-bold leading-none tracking-tight drop-shadow-md">NOSSAS CATEGORIAS</h1>
        </div>
    </section>

    <!-- GRADE DE CATEGORIAS -->
    <section class="w-full py-20 bg-gray-50 min-h-[500px]">
        <div class="container mx-auto px-8 lg:px-24">
            <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-8">
                
                <!-- Categoria 1: Ganchos -->
                <a href="produtos/categoria-ganchos.html" class="relative w-full h-[300px] bg-white rounded-lg overflow-hidden group cursor-pointer shadow-md hover:shadow-2xl transition-all duration-300">
                    <img src="../../midia/gancho para painel canaletado branco fundo branco.png" alt="Ganchos" class="w-full h-full object-cover group-hover:scale-110 transition duration-700">
                    <div class="absolute inset-0 bg-gradient-to-t from-black/90 via-black/20 to-transparent opacity-90 group-hover:opacity-100 transition duration-300"></div>
                    <div class="absolute bottom-6 left-6 right-6">
                        <h3 class="text-white font-bold text-[24px] leading-tight mb-2">Ganchos</h3>
                        <span class="text-mm-yellow text-sm font-semibold flex items-center gap-2">Ver produtos <i class="fas fa-arrow-right text-xs"></i></span>
                    </div>
                </a>

                <!-- Categoria 2: Barras Expositoras -->
                <a href="produtos/categoria-barras.html" class="relative w-full h-[300px] bg-white rounded-lg overflow-hidden group cursor-pointer shadow-md hover:shadow-2xl transition-all duration-300">
                    <img src="../../midia/barra para gôndola fundo branco.png" alt="Barras Expositoras" class="w-full h-full object-cover group-hover:scale-110 transition duration-700">
                    <div class="absolute inset-0 bg-gradient-to-t from-black/90 via-black/20 to-transparent opacity-90 group-hover:opacity-100 transition duration-300"></div>
                    <div class="absolute bottom-6 left-6 right-6">
                        <h3 class="text-white font-bold text-[24px] leading-tight mb-2">Barras Expositoras</h3>
                        <span class="text-mm-yellow text-sm font-semibold flex items-center gap-2">Ver produtos <i class="fas fa-arrow-right text-xs"></i></span>
                    </div>
                </a>

                <!-- Categoria 3: Gôndolas -->
                <a href="produtos/categoria-barras.html" class="relative w-full h-[300px] bg-white rounded-lg overflow-hidden group cursor-pointer shadow-md hover:shadow-2xl transition-all duration-300">
                    <!-- Foto ilustrativa de gôndolas -->
                    <img src="https://images.unsplash.com/photo-1578916171728-46686eac8d58?auto=format&fit=crop&q=80" alt="Gôndolas" class="w-full h-full object-cover group-hover:scale-110 transition duration-700">
                    <div class="absolute inset-0 bg-gradient-to-t from-black/90 via-black/20 to-transparent opacity-90 group-hover:opacity-100 transition duration-300"></div>
                    <div class="absolute bottom-6 left-6 right-6">
                        <h3 class="text-white font-bold text-[24px] leading-tight mb-2">Gôndolas</h3>
                        <span class="text-mm-yellow text-sm font-semibold flex items-center gap-2">Ver produtos <i class="fas fa-arrow-right text-xs"></i></span>
                    </div>
                </a>

                <!-- Categoria 4: Suportes -->
                <a href="produtos/categoria-suportes.html" class="relative w-full h-[300px] bg-white rounded-lg overflow-hidden group cursor-pointer shadow-md hover:shadow-2xl transition-all duration-300">
                    <img src="../../midia//suporte de faca.jpeg" alt="Suportes" class="w-full h-full object-cover group-hover:scale-110 transition duration-700">
                    <div class="absolute inset-0 bg-gradient-to-t from-black/90 via-black/20 to-transparent opacity-90 group-hover:opacity-100 transition duration-300"></div>
                    <div class="absolute bottom-6 left-6 right-6">
                        <h3 class="text-white font-bold text-[24px] leading-tight mb-2">Suportes</h3>
                        <span class="text-mm-yellow text-sm font-semibold flex items-center gap-2">Ver produtos <i class="fas fa-arrow-right text-xs"></i></span>
                    </div>
                </a>

            </div>
        </div>
    </section>

    <!-- FOOTER E WHATSAPP (Resumidos aqui para economizar espaço de leitura, mantenha os seus padrões originais) -->
    <footer class="w-full bg-mm-footer pt-16 pb-12 relative z-0">
        <!-- Seu Footer Original Aqui -->
        <div class="container mx-auto px-8 lg:px-24 text-center text-gray-400 text-sm">
            <img src="../../midia/logo4.png" alt="Logo" class="mx-auto mb-4 w-[120px]">
            <p>&copy; MM Montagens. Todos os direitos reservados.</p>
        </div>
    </footer>

    <script src="/carrinho.js"></script>
</body>
</html>
